# RoundCount Launcher Icon Configuration
#
# Requires assets/brand/roundcount_icon.png to exist (1024x1024 px).
#
# To generate icons:
#   dart run flutter_launcher_icons
#
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/roundcount_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0F0D"
  adaptive_icon_foreground: "assets/brand/roundcount_icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false